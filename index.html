<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="法律週攤位">
<meta name="theme-color" content="#534AB7">
<title>法律週攤位系統</title>
<style>
:root{--r:12px;--rs:8px;--purple:#534AB7;--purple-d:#3C3489;--purple-l:#EEEDFE;--green:#0F6E56;--green-l:#E1F5EE;--amber:#854F0B;--amber-l:#FAEEDA;--red:#A32D2D;--red-l:#FCEBEB;--blue:#185FA5;--blue-l:#E6F1FB;--coral:#993C1D;--coral-l:#FAECE7;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-x:hidden}
body{min-height:100%;min-height:100dvh;background:#f5f5f7;color:#1a1a1a;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:16px;overflow-x:hidden}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1e;color:#f2f2f7}
  .card,.metric,.order-card,.topbar{background:#2c2c2e!important}
  .card,.metric,.order-card,.topbar,.op-selector{border-color:rgba(255,255,255,0.1)!important}
  input,select,.day-btn,.shift-btn,.qb,.btn-o,.cash-input,.op-btn{background:#3a3a3c!important;color:#f2f2f7!important;border-color:rgba(255,255,255,0.15)!important}
  .m-lbl,.topbar-sub,.pprice,.oprev,.oi-qty,.sec-lbl,.cl,.hist-detail,.back-btn,.pay-sub-lbl,.team-title{color:#aeaeb2!important}
  .empty{color:#6e6e73!important}
  .divider,.oi,.prod-row,.ototal,.hist-row,.order-body,.op-row{border-color:rgba(255,255,255,0.1)!important}
  .tag-void{background:#3a3a3c!important;color:#aeaeb2!important}
  .op-ind-a{background:#1a2540!important;border-color:#378ADD!important}
  .op-ind-b{background:#2d1a14!important;border-color:#D85A30!important}
  .btn-o{color:#f2f2f7!important}
  .order-hd:active{background:#3a3a3c!important}
  .test-banner{background:#2a1f00!important;border-color:#EF9F27!important}
  .member-chip{background:#3a3a3c!important;color:#f2f2f7!important;border-color:rgba(255,255,255,0.15)!important}
}
#app{width:100%;max-width:600px;margin:0 auto;min-height:100dvh;background:inherit;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:12px 16px;padding-top:calc(12px + var(--safe-top));position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:12px;color:#6e6e73;margin-top:2px}
.content{flex:1;overflow-y:auto;padding:10px 14px;padding-bottom:calc(24px + var(--safe-bot));-webkit-overflow-scrolling:touch}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:var(--r);margin-bottom:10px}
.ci{padding:14px}
.cl{font-size:11px;font-weight:600;color:#6e6e73;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.divider{height:0.5px;background:rgba(0,0,0,0.08);margin:12px 0}
input,select{width:100%;height:46px;font-size:16px;padding:0 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:var(--rs);background:#f5f5f7;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px rgba(83,74,183,.15)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
label{font-size:13px;color:#6e6e73;display:block;margin-bottom:4px;font-weight:500}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:46px;padding:0 16px;border-radius:var(--rs);font-size:15px;font-weight:500;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;transition:opacity .1s}
.btn:active{opacity:.7}
.btn-full{width:100%}
.btn-p{background:var(--purple);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-o{background:#f5f5f7;color:#1a1a1a;border:0.5px solid rgba(0,0,0,0.2)}
.btn-d{background:var(--red-l);color:var(--red)}
.btn-ghost{background:none;border:none;color:#6e6e73;padding-left:0}
.btn-sm{min-height:36px;font-size:13px;padding:0 12px}
.btn-xs{min-height:30px;font-size:12px;padding:0 10px}
.btn-lg{min-height:54px;font-size:17px;font-weight:600}
.btn-test{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27}
.back-btn{display:flex;align-items:center;gap:4px;font-size:15px;color:#6e6e73;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;touch-action:manipulation;min-height:36px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.day-btn{height:50px;border:2px solid rgba(0,0,0,0.15);border-radius:var(--rs);background:#f5f5f7;font-size:14px;font-weight:600;cursor:pointer;color:#6e6e73;touch-action:manipulation;transition:all .15s}
.day-btn.sel{background:var(--purple)!important;color:#fff!important;border-color:var(--purple)!important;font-weight:700}
.shift-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.shift-btn{min-height:70px;border:2px solid rgba(0,0,0,0.15);border-radius:var(--rs);background:#f5f5f7;cursor:pointer;font-family:inherit;color:#6e6e73;padding:10px 6px;touch-action:manipulation;transition:all .15s}
.shift-btn .sn{font-size:16px;font-weight:600;display:block}
.shift-btn .st{font-size:11px;display:block;margin-top:3px;color:#aeaeb2}
.shift-btn.sel-m{background:var(--purple-l)!important;color:var(--purple-d)!important;border-color:var(--purple)!important;border-width:2.5px}
.shift-btn.sel-a{background:var(--green-l)!important;color:var(--green)!important;border-color:var(--green)!important;border-width:2.5px}
.shift-btn.sel-e{background:var(--amber-l)!important;color:var(--amber)!important;border-color:#EF9F27!important;border-width:2.5px}
.shift-btn.sel-m::after,.shift-btn.sel-a::after,.shift-btn.sel-e::after{content:'✓';font-size:13px;font-weight:700;display:block;margin-top:2px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:var(--rs);padding:10px 12px}
.m-lbl{font-size:11px;color:#aeaeb2;margin-bottom:2px}
.m-val{font-size:24px;font-weight:600}
.badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.bm{background:var(--purple-l);color:var(--purple-d)}
.ba{background:var(--green-l);color:var(--green)}
.be{background:var(--amber-l);color:var(--amber)}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.tag-paid{background:var(--green-l);color:var(--green)}
.tag-pend{background:var(--amber-l);color:var(--amber)}
.tag-void{background:#f1f0e8;color:#aeaeb2}
.tag-test{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27}
.op-a{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--blue-l);color:var(--blue);font-weight:600;white-space:nowrap}
.op-b{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--coral-l);color:var(--coral);font-weight:600;white-space:nowrap}
.op-selector{display:grid;grid-template-columns:1fr 1fr;border:0.5px solid rgba(0,0,0,0.2);border-radius:var(--rs);overflow:hidden;margin-bottom:10px}
.op-btn{min-height:50px;border:none;background:#f5f5f7;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;touch-action:manipulation;color:#6e6e73;border-right:0.5px solid rgba(0,0,0,0.1);transition:all .15s}
.op-btn:last-child{border-right:none}
.op-btn.sel-a{background:var(--blue-l);color:var(--blue);font-weight:700}
.op-btn.sel-b{background:var(--coral-l);color:var(--coral);font-weight:700}
.op-indicator{border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.op-ind-a{background:var(--blue-l);border:1.5px solid #85B7EB}
.op-ind-b{background:var(--coral-l);border:1.5px solid #F0997B}
.op-ind-name{font-size:15px;font-weight:600}
.op-ind-name-a{color:var(--blue)}
.op-ind-name-b{color:var(--coral)}
.op-ind-hint{font-size:12px;margin-top:1px}
.op-ind-hint-a{color:#378ADD}
.op-ind-hint-b{color:#D85A30}
.prod-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.prod-row:last-child{border-bottom:none}
.pname{font-size:15px;font-weight:500;flex:1}
.pprice{font-size:12px;color:#6e6e73;margin-top:2px}
.qctrl{display:flex;align-items:center;gap:8px}
.qb{width:42px;height:42px;border:0.5px solid rgba(0,0,0,0.2);background:#f5f5f7;border-radius:var(--rs);cursor:pointer;font-size:22px;color:#1a1a1a;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0}
.qb:active{opacity:.6}
.qn{min-width:34px;text-align:center;font-size:18px;font-weight:600}
.order-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:var(--rs);margin-bottom:8px;overflow:hidden}
.order-hd{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;touch-action:manipulation}
.order-hd:active{background:#f5f5f7}
.onum{font-size:12px;font-weight:600;color:#aeaeb2;min-width:38px}
.osum{flex:1;min-width:0}
.oamt{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.oprev{font-size:12px;color:#6e6e73;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-body{padding:10px 14px;border-top:0.5px solid rgba(0,0,0,0.08);display:none}
.order-body.open{display:block}
.oi{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.oi:last-child{border-bottom:none}
.oi-qty{color:#6e6e73;margin:0 8px}
.oi-sub{font-weight:600}
.ototal{display:flex;justify-content:space-between;font-size:14px;font-weight:600;padding-top:8px}
.pay-done{font-size:12px;color:var(--green);padding:8px 14px;border-top:0.5px solid rgba(0,0,0,0.08);background:var(--green-l)}
.op-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:8px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.cash-input{width:100%;height:68px;font-size:30px;font-weight:600;padding:0 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:var(--rs);background:#f5f5f7;color:#1a1a1a;font-family:inherit;text-align:right;-webkit-appearance:none;appearance:none}
.cash-input:focus{outline:none;border-color:var(--purple)}
.change-big{font-size:40px;font-weight:700;text-align:center;padding:12px 0}
.pay-sub-lbl{font-size:13px;color:#6e6e73;margin-bottom:2px;text-align:center}
.hist-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.hist-row:last-child{border-bottom:none}
.hist-info{flex:1}
.hist-name{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.hist-detail{font-size:12px;color:#6e6e73}
.gs-btn{width:100%;min-height:50px;background:#0F9D58;color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;margin-top:10px}
.gs-btn:active{background:#085041}
.notice{border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-top:8px;line-height:1.5}
.n-ok{background:var(--green-l);color:var(--green)}
.n-err{background:var(--red-l);color:var(--red)}
.n-warn{background:var(--amber-l);color:var(--amber)}
.sec-lbl{font-size:12px;font-weight:600;color:#6e6e73;letter-spacing:.05em;text-transform:uppercase;margin:12px 0 8px}
.empty{text-align:center;padding:28px 0;color:#aeaeb2;font-size:14px}
.ctag{font-size:11px;background:var(--amber-l);color:var(--amber);padding:1px 6px;border-radius:10px;font-weight:500}
.test-banner{background:#FFFBEA;border:1.5px solid #EF9F27;border-radius:var(--rs);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#854F0B}
.member-chip{display:inline-flex;align-items:center;gap:6px;background:#f5f5f7;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;padding:5px 12px;font-size:13px;margin:3px}
.member-chip .del-member{background:none;border:none;cursor:pointer;color:#aeaeb2;font-size:16px;padding:0;line-height:1;touch-action:manipulation}
.member-chip .del-member:active{color:var(--red)}
.member-list{display:flex;flex-wrap:wrap;margin-bottom:6px;min-height:32px}
.team-title{font-size:13px;font-weight:600;color:#6e6e73;margin-bottom:6px;}
</style>
</head>
<body>
<div id="app">
<!-- ====== SETUP ====== -->
<div id="s-setup" class="screen active">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">法律週攤位系統</div>
        <div class="topbar-sub">選擇班次開始作業</div>
      </div>
      <button class="btn btn-test btn-sm" onclick="startTestShift()" style="flex-shrink:0">🧪 測試模式</button>
    </div>
  </div>
  <div class="content">
    <div class="card"><div class="ci">
      <div class="cl">日期</div>
      <div class="day-grid" id="day-btns"></div>
    </div></div>
    <div class="card"><div class="ci">
      <div class="cl">時段</div>
      <div class="shift-grid">
        <button class="shift-btn" id="sb-m" onclick="pickShift(this,'早班','m')"><span class="sn">早班</span><span class="st">10:10–12:10</span></button>
        <button class="shift-btn" id="sb-a" onclick="pickShift(this,'午班','a')"><span class="sn">午班</span><span class="st">12:10–13:10</span></button>
        <button class="shift-btn" id="sb-e" onclick="pickShift(this,'晚班','e')"><span class="sn">晚班</span><span class="st">13:10–15:10</span></button>
      </div>
    </div></div>
    
    <!-- 人員管理區塊 -->
    <div class="card"><div class="ci">
      <div class="cl">值班人員</div>
      <div class="g2" style="margin-bottom:12px">
        <div><label>A 位</label><select id="sel-a"></select></div>
        <div><label>B 位</label><select id="sel-b"></select></div>
      </div>
      <div class="cl" style="margin-bottom:6px">管理人員名單</div>
      <div class="team-title">幹部</div>
      <div class="member-list" id="member-list-core"></div>
      <div class="team-title" style="margin-top:8px">儲備幹部</div>
      <div class="member-list" id="member-list-reserve" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <select id="new-member-type" style="width:110px;height:40px;font-size:14px;padding:0 8px;">
          <option value="core">幹部</option>
          <option value="reserve">儲備幹部</option>
        </select>
        <input id="new-member-input" placeholder="輸入姓名" style="flex:1;height:40px;font-size:14px">
        <button class="btn btn-p btn-sm" onclick="addMember()" style="flex-shrink:0">新增</button>
      </div>
    </div></div>

    <!-- 商品管理區塊 -->
    <div class="card"><div class="ci">
      <div class="cl">常駐商品 / 優惠方案管理</div>
      <div class="member-list" id="prod-setup-list" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <input id="new-prod-name" placeholder="商品/方案名稱" style="flex:2;height:40px;font-size:14px">
        <input id="new-prod-price" type="number" inputmode="numeric" placeholder="售價" style="flex:1;height:40px;font-size:14px">
        <button class="btn btn-p btn-sm" onclick="addSetupProd()" style="flex-shrink:0">新增</button>
      </div>
    </div></div>

    <button class="btn btn-p btn-full btn-lg" onclick="startShift()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      開始班次
    </button>
    <div id="hist-wrap" style="display:none;margin-top:16px">
      <div class="sec-lbl">歷史班次</div>
      <div class="card"><div class="ci"><div id="hist-list"></div></div></div>
      <button class="gs-btn" onclick="exportAll()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        匯出全部至 Google Sheet
      </button>
      <div id="exp-msg" style="display:none;"></div>
    </div>
  </div>
</div>
<!-- ====== SHIFT MAIN ====== -->
<div id="s-shift" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
        <span id="shift-badge" class="badge"></span>
        <span id="shift-staff" style="font-size:12px;color:#6e6e73;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></span>
      </div>
      <button class="btn btn-d btn-sm" onclick="endShift()" style="flex-shrink:0;margin-left:8px">結班</button>
    </div>
  </div>
  <div class="content">
    <div id="test-banner-shift" class="test-banner" style="display:none">
      <span>🧪</span><span>測試模式 — 資料匯出時將標記為「測試」</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="m-lbl">訂單數</div><div class="m-val" style="color:var(--blue)" id="m-tot">0</div></div>
      <div class="metric"><div class="m-lbl">班次營收</div><div class="m-val" style="color:var(--green)" id="m-rev">$0</div></div>
      <div class="metric"><div class="m-lbl">待收款</div><div class="m-val" style="color:var(--amber)" id="m-pend">0</div></div>
      <div class="metric"><div class="m-lbl">已收款</div><div class="m-val" style="color:var(--green)" id="m-paid">0</div></div>
    </div>
    <div class="card"><div class="ci" style="padding:10px 14px">
      <div class="cl" style="margin-bottom:8px">現在是誰在操作？</div>
      <div class="op-selector">
        <button class="op-btn" id="op-btn-a" onclick="switchOp('a')"></button>
        <button class="op-btn" id="op-btn-b" onclick="switchOp('b')"></button>
      </div>
      <div id="op-indicator" class="op-indicator op-ind-a">
        <div>
          <div class="op-ind-name op-ind-name-a" id="op-ind-name"></div>
          <div class="op-ind-hint op-ind-hint-a" id="op-ind-hint"></div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" id="op-ind-icon"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div></div>
    <button class="btn btn-p btn-full" style="min-height:54px;font-size:16px;margin-bottom:10px" onclick="openNew()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增訂單
    </button>
    <div id="pending-section" style="display:none">
      <div class="sec-lbl">待收款</div>
      <div id="orders-pend"></div>
    </div>
    <div class="sec-lbl">所有訂單</div>
    <div id="orders-all"><div class="empty">尚無訂單</div></div>
  </div>
</div>
<!-- ====== NEW ORDER ====== -->
<div id="s-new" class="screen">
  <div class="topbar">
    <div class="topbar-row">
      <button class="back-btn" onclick="navBack()">

<script>
/* ===== 設定 ===== */
let MEMBERS_CORE=['許紘睿','陳怡岑','李懿珊','林靜玟','陳竫媗','顏紹耘','陳昱亘','陶玉慧','陳耀豐','張群佑','張翊閎','藍于驊','方鈺瑜','簡宇彥','林祺臻'];
let MEMBERS_RESERVE=['賴杏恩','吳宥勝','羅允威','陳采靖','吳安琪','韓洛君','鄭天愛','楊旻姍','楊逸宇','陳稚昇','王立綺','林聖倫','雲馨葳','丁郁婷','尹邦臻','張祐容','江俊諺','郭家妤'];

// V9 更新：預設商品清單
let PRODUCTS=[
  {n:'泡泡水',p:20},
  {n:'打火機',p:50},
  {n:'資料夾',p:40},
  {n:'貼紙',p:5},
  {n:'吊飾',p:30},
  {n:'徽章',p:30},
  {n:'卡套(絕版品出清)',p:20},
  {n:'(促銷)資料夾全科三件套',p:100},
  {n:'(促銷)貼紙任選五張',p:20},
  {n:'(促銷)All in 啦 All in',p:250},
  {n:'(促銷)吊飾徽章組',p:50},
  {n:'(促銷)滿百加十元贈卡套',p:10}
];

const DAYS=['5/11','5/12','5/13','5/14','5/15'];
const SHEET_ID='12AbQUXDtkU6mFiOSIgOSJj1CCUw5Ir4hAaZC_uyf-6k';
let GAS_URL='https://script.google.com/macros/s/AKfycbw9LAt15kMsSDuNZe2D9cOgRWPKjJrSAkHV7ruCGCowp-QxPRM9SvZzOmL4OQskxCi5/exec'; 
/* ===== 設定結束 ===== */

let selDay='',selShift='',selCode='';
let shift=null,orders=[],cnt=1,curOp='a',isTest=false;
let newItems={},newExtras=[],payId=null,allShifts=[];
let navStack=[];
const nt=n=>'NT$'+Math.round(n).toLocaleString();
const ts=()=>new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
const onum=o=>'#'+String(o.id).padStart(3,'0');
const opName=pos=>pos==='a'?shift.staffA:shift.staffB;
const opTag=pos=>pos==='a'
  ?`<span class="op-a">${shift.staffA}</span>`
  :`<span class="op-b">${shift.staffB}</span>`;

/* ---- 防護機制 1：關閉/重整網頁攔截 (Before Unload) ---- */
window.addEventListener('beforeunload', function (e) {
  const hasUnexported = allShifts.some(s => !s.exported);
  const isShiftActive = shift !== null;
  if (hasUnexported || isShiftActive) {
    e.preventDefault();
    e.returnValue = ''; 
  }
});

/* ---- 防護機制 2：歷史紀錄陷阱 (History Trap) ---- */
history.replaceState({trap: true}, '', location.pathname);
history.pushState({screen: 's-setup'}, '', location.pathname);

function show(id,push=true){
  const prev=document.querySelector('.screen.active');
  if(push && prev) navStack.push(prev.id);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  history.pushState({screen: id}, '', location.pathname);
}

function navBack(){
  if(navStack.length===0){
    show('s-setup', false);
    navStack=[];
    return;
  }
  const prev=navStack.pop();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(prev).classList.add('active');
  window.scrollTo(0,0);
  history.replaceState({screen: prev}, '', location.pathname);
  if(prev==='s-shift') renderShift();
}

window.addEventListener('popstate', function(e){
  if(navStack.length > 0){
    navBack();
  } else {
    if(e.state && e.state.trap){
      history.pushState({screen: 's-setup'}, '', location.pathname);
      const w = document.getElementById('hist-wrap');
      w.style.display = 'block';
      const msgEl = document.getElementById('exp-msg');
      msgEl.className = 'notice n-err';
      msgEl.innerHTML = '⚠️ <strong>安全攔截：</strong>為防止資料遺失，已阻擋「返回鍵」操作。若要離開，請確認已匯出資料並「直接關閉分頁」。';
      msgEl.style.display = 'block';
    }
  }
});

/* ---- Products Persistence ---- */
function saveProds(){
  try{localStorage.setItem('lw_prods',JSON.stringify(PRODUCTS));}catch(e){}
}
function loadProds(){
  try{
    const d=localStorage.getItem('lw_prods');
    if(d) PRODUCTS=JSON.parse(d);
  }catch(e){}
}
function renderSetupProds(){
  document.getElementById('prod-setup-list').innerHTML=PRODUCTS.map((p,i)=>`
    <span class="member-chip">${p.n} ($${p.p})
      <button class="del-member" onclick="delSetupProd(${i})" title="移除">×</button>
    </span>`).join('');
}
function addSetupProd(){
  const n = document.getElementById('new-prod-name').value.trim();
  const p = parseFloat(document.getElementById('new-prod-price').value);
  if(!n || isNaN(p)){alert('請輸入完整的商品名稱與售價');return;}
  if(PRODUCTS.find(x=>x.n===n)){alert('此商品或方案名稱已存在');return;}
  
  PRODUCTS.push({n, p});
  saveProds();
  document.getElementById('new-prod-name').value='';
  document.getElementById('new-prod-price').value='';
  renderSetupProds();
}
function delSetupProd(i){
  if(!window.confirm(`確定移除常駐商品「${PRODUCTS[i].n}」？\n(移除後不影響過去已經建立的歷史訂單)`))return;
  PRODUCTS.splice(i, 1);
  saveProds();
  renderSetupProds();
}

/* ---- Members Persistence ---- */
function saveMem(){
  try{
    localStorage.setItem('lw_members_core',JSON.stringify(MEMBERS_CORE));
    localStorage.setItem('lw_members_res',JSON.stringify(MEMBERS_RESERVE));
  }catch(e){}
}
function loadMem(){
  try{
    const d1=localStorage.getItem('lw_members_core');
    const d2=localStorage.getItem('lw_members_res');
    const dOld=localStorage.getItem('lw_members');
    if(!d1 && !d2 && dOld){
      MEMBERS_CORE = JSON.parse(dOld);
      saveMem(); 
    } else {
      if(d1) MEMBERS_CORE=JSON.parse(d1);
      if(d2) MEMBERS_RESERVE=JSON.parse(d2);
    }
  }catch(e){}
}
function renderMemberList(){
  document.getElementById('member-list-core').innerHTML=MEMBERS_CORE.map((m,i)=>`
    <span class="member-chip">${m}
      <button class="del-member" onclick="delMember('core', ${i})" title="移除">×</button>
    </span>`).join('');
    
  document.getElementById('member-list-reserve').innerHTML=MEMBERS_RESERVE.map((m,i)=>`
    <span class="member-chip">${m}
      <button class="del-member" onclick="delMember('reserve', ${i})" title="移除">×</button>
    </span>`).join('');

  const coreOpts=MEMBERS_CORE.map(m=>`<option value="${m}">${m}</option>`).join('');
  const resOpts=MEMBERS_RESERVE.map(m=>`<option value="${m}">${m}</option>`).join('');
  
  let allOpts = '';
  if(MEMBERS_CORE.length > 0) allOpts += `<optgroup label="幹部">${coreOpts}</optgroup>`;
  if(MEMBERS_RESERVE.length > 0) allOpts += `<optgroup label="儲備幹部">${resOpts}</optgroup>`;

  document.getElementById('sel-a').innerHTML=allOpts;
  document.getElementById('sel-b').innerHTML=allOpts;
  
  if(MEMBERS_CORE.length > 1) {
    document.getElementById('sel-b').selectedIndex=1;
  } else if (MEMBERS_RESERVE.length > 0 && MEMBERS_CORE.length === 1) {
    document.getElementById('sel-b').selectedIndex=1;
  }
}
function addMember(){
  const type = document.getElementById('new-member-type').value;
  const inp = document.getElementById('new-member-input');
  const name = inp.value.trim();
  if(!name){alert('請輸入姓名');return}
  if(MEMBERS_CORE.includes(name) || MEMBERS_RESERVE.includes(name)){alert('此人員已在名單中');return}
  
  if(type === 'core') MEMBERS_CORE.push(name);
  else MEMBERS_RESERVE.push(name);
  
  saveMem();
  inp.value='';
  renderMemberList();
}
function delMember(type, i){
  const name = type === 'core' ? MEMBERS_CORE[i] : MEMBERS_RESERVE[i];
  if(!window.confirm(`確定移除「${name}」？`))return;
  
  if(type === 'core') MEMBERS_CORE.splice(i,1);
  else MEMBERS_RESERVE.splice(i,1);
  
  saveMem();
  renderMemberList();
}

/* ---- Init ---- */
function init(){
  loadMem();
  loadProds(); 
  
  const db=document.getElementById('day-btns');
  DAYS.forEach(d=>{
    const b=document.createElement('button');b.className='day-btn';b.textContent=d;
    b.onclick=()=>{document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');selDay=d};
    db.appendChild(b);
  });
  renderMemberList();
  renderSetupProds();
  loadShifts();
  document.getElementById('new-member-input').addEventListener('keydown',e=>{if(e.key==='Enter')addMember()});
  document.getElementById('new-prod-price').addEventListener('keydown',e=>{if(e.key==='Enter')addSetupProd()});
}

/* ---- Shift setup ---- */
function pickShift(el,name,code){
  document.querySelectorAll('.shift-btn').forEach(b=>{b.className='shift-btn';});
  el.className=`shift-btn sel-${code}`;
  selShift=name;selCode=code;
}
function startShift(test=false){
  if(!selDay){alert('請選擇日期');return}
  if(!selShift){alert('請選擇時段');return}
  const a=document.getElementById('sel-a').value,b=document.getElementById('sel-b').value;
  if(a===b){alert('A 位與 B 位不能是同一人');return}
  isTest=test;
  shift={day:selDay,shift:selShift,code:selCode,staffA:a,staffB:b,startAt:ts(),isTest:test};
  orders=[];cnt=1;curOp='a';
  document.getElementById('shift-badge').textContent=`${shift.day} ${shift.shift}`;
  document.getElementById('shift-badge').className=`badge b${shift.code}`;
  document.getElementById('shift-staff').textContent=`${a}・${b}${test?' 🧪 測試':''}`;
  document.getElementById('test-banner-shift').style.display=test?'flex':'none';
  document.getElementById('op-btn-a').textContent=a+' (A)';
  document.getElementById('op-btn-b').textContent=b+' (B)';
  updateOpUI();updateM();renderShift();
  navStack=[];show('s-shift',false);
}
function startTestShift(){
  if(!selDay){const first=document.querySelector('.day-btn');if(first){first.click()}}
  if(!selShift){document.getElementById('sb-m').click();}
  startShift(true);
}

/* ---- Operator UI ---- */
function switchOp(pos){curOp=pos;updateOpUI()}
function updateOpUI(){
  document.getElementById('op-btn-a').className='op-btn'+(curOp==='a'?' sel-a':'');
  document.getElementById('op-btn-b').className='op-btn'+(curOp==='b'?' sel-b':'');
  const ind=document.getElementById('op-indicator'),nm=document.getElementById('op-ind-name'),ht=document.getElementById('op-ind-hint'),ic=document.getElementById('op-ind-icon');
  if(curOp==='a'){
    ind.className='op-indicator op-ind-a';nm.className='op-ind-name op-ind-name-a';
    nm.textContent=shift.staffA+' (A 位)';ht.className='op-ind-hint op-ind-hint-a';
    ht.textContent='此人建立的訂單將標記為 A';ic.setAttribute('stroke','var(--blue)');
  } else {
    ind.className='op-indicator op-ind-b';nm.className='op-ind-name op-ind-name-b';
    nm.textContent=shift.staffB+' (B 位)';ht.className='op-ind-hint op-ind-hint-b';
    ht.textContent='此人建立的訂單將標記為 B';ic.setAttribute('stroke','var(--coral)');
  }
}

/* ---- Metrics ---- */
function updateM(){
  const paid=orders.filter(o=>o.status==='paid'),pend=orders.filter(o=>o.status==='pending');
  document.getElementById('m-tot').textContent=orders.length;
  document.getElementById('m-pend').textContent=pend.length;
  document.getElementById('m-paid').textContent=paid.length;
  document.getElementById('m-rev').textContent=nt(paid.reduce((s,o)=>s+o.total,0));
}

/* ---- Render orders ---- */
function renderShift(){
  const pend=orders.filter(o=>o.status==='pending');
  document.getElementById('pending-section').style.display=pend.length?'block':'none';
  document.getElementById('orders-pend').innerHTML=pend.map(o=>ocard(o,true)).join('');
  const all=orders.slice().reverse();
  document.getElementById('orders-all').innerHTML=all.length?all.map(o=>ocard(o,false)).join(''):'<div class="empty">尚無訂單</div>';
}
function ocard(o,showPay){
  const rows=o.items.map(i=>`<div class="oi"><span>${i.n}</span><span class="oi-qty">×${i.q}</span><span class="oi-sub">${nt(i.p*i.q)}</span></div>`).join('');
  const st=o.status==='paid'?'<span class="tag tag-paid">已收款</span>':o.status==='void'?'<span class="tag tag-void">作廢</span>':'<span class="tag tag-pend">待收款</span>';
  const testT=o.isTest?'<span class="tag tag-test">測試</span>':'';
  const opT=o.op?opTag(o.op):'';
  const payBtn=showPay&&o.status==='pending'?`<button class="btn btn-g btn-xs" onclick="event.stopPropagation();openPay(${o.id})" style="flex-shrink:0">收款</button>`:'';
  const voidBtn=!showPay&&o.status==='pending'?`<button class="btn btn-d btn-xs" onclick="event.stopPropagation();voidOrder(${o.id})" style="flex-shrink:0">作廢</button>`:'';
  const done=o.status==='paid'?`<div class="pay-done">實收 ${nt(o.rcv)}　找零 ${nt(o.chg)}　${o.paidAt}</div>`:'';
  const memoHtml = (o.memo && o.memo.trim() !== '') ? `<div style="font-size:12px;color:#854F0B;margin-top:6px;background:#FFFBEA;padding:4px 8px;border-radius:4px;">備註: ${o.memo}</div>` : '';
  
  return`<div class="order-card">
    <div class="order-hd" onclick="tog(this)">
      <span class="onum">${onum(o)}</span>
      <div class="osum"><div class="oamt">${nt(o.total)} ${opT} ${testT}</div><div class="oprev">${o.items.map(i=>i.n+'×'+i.q).join('、')}</div></div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">${st}${payBtn}${voidBtn}</div>
    </div>
    <div class="order-body">
      <div class="op-row"><span style="font-size:12px;color:#6e6e73">操作員</span>${opT}<span style="font-size:12px;color:#aeaeb2;margin-left:4px">${o.at}</span></div>
      ${rows}<div class="ototal"><span>合計</span><span style="color:var(--green)">${nt(o.total)}</span></div>
      ${memoHtml}
    </div>${done}
  </div>`;
}
function tog(el){el.nextElementSibling.classList.toggle('open')}
function voidOrder(id){
  if(!window.confirm('確定作廢此筆訂單？'))return;
  const o=orders.find(x=>x.id===id);if(o)o.status='void';
  updateM();renderShift();
}

/* ---- New order ---- */
function openNew(){
  newItems={};
  PRODUCTS.forEach(p=>{newItems[p.n]=0});
  newExtras=[];
  
  document.getElementById('new-num').textContent=`訂單 ${onum({id:cnt})}`;
  const bar=document.getElementById('new-op-bar');
  bar.className='op-indicator '+(curOp==='a'?'op-ind-a':'op-ind-b');
  document.getElementById('new-op-role').textContent=curOp==='a'?'A 位操作員':'B 位操作員';
  const nm=document.getElementById('new-op-name');
  nm.className='op-ind-name '+(curOp==='a'?'op-ind-name-a':'op-ind-name-b');
  nm.textContent=opName(curOp);
  document.getElementById('new-op-tag').innerHTML=opTag(curOp);
  const footer=document.getElementById('new-footer');
  const sb=document.getElementById('submit-btn');
  if(curOp==='a'){footer.style.background='#EEEDFE';footer.style.borderColor='#AFA9EC';document.getElementById('new-total').style.color='var(--purple)';sb.style.background='var(--green)'}
  else{footer.style.background=`var(--coral-l)`;footer.style.borderColor='#F0997B';document.getElementById('new-total').style.color='var(--coral)';sb.style.background='var(--coral)'}
  renderProds();show('s-new');
}
function renderProds(){
  document.getElementById('prod-list').innerHTML=PRODUCTS.map(p=>`
    <div class="prod-row">
      <div style="flex:1"><div class="pname">${p.n}</div><div class="pprice">${nt(p.p)}</div></div>
      <div class="qctrl">
        <button class="qb" onclick="chg('${p.n}',-1)">−</button>
        <span class="qn" id="q${p.n}">${newItems[p.n]||0}</span>
        <button class="qb" onclick="chg('${p.n}',1)">+</button>
      </div>
    </div>`).join('');
  renderExtras();updTotal();
}
function chg(name,d){
  newItems[name]=Math.max(0,(newItems[name]||0)+d);
  const el=document.getElementById('q'+name);if(el)el.textContent=newItems[name];
  updTotal();
}
function renderExtras(){
  const el=document.getElementById('extra-list');
  el.innerHTML=newExtras.length?'<div style="margin-top:10px">'+newExtras.map((e,i)=>`
    <div class="prod-row"><div style="flex:1"><div class="pname">${e.n} <span class="ctag">自訂</span></div><div class="pprice">${nt(e.p)} × ${e.q} = ${nt(e.p*e.q)}</div></div>
    <button class="btn btn-d btn-xs" onclick="rmEx(${i})">移除</button></div>`).join('')+'</div>':'';
}
function addExtra(){
  const n=document.getElementById('ex-n').value.trim(),p=parseFloat(document.getElementById('ex-p').value)||0,q=parseInt(document.getElementById('ex-q').value)||1;
  if(!n||!p){alert('請填寫名稱與售價');return}
  newExtras.push({n,p,q});
  document.getElementById('ex-n').value='';document.getElementById('ex-p').value='';document.getElementById('ex-q').value='1';
  renderExtras();updTotal();
}
function rmEx(i){newExtras.splice(i,1);renderExtras();updTotal()}
function getTotal(){let s=0;PRODUCTS.forEach(p=>{s+=p.p*(newItems[p.n]||0)});newExtras.forEach(e=>{s+=e.p*e.q});return s}
function updTotal(){document.getElementById('new-total').textContent=nt(getTotal())}
function submitOrder(){
  const items=[];
  PRODUCTS.forEach(p=>{if((newItems[p.n]||0)>0)items.push({n:p.n,p:p.p,q:newItems[p.n]})});
  newExtras.forEach(e=>items.push({n:e.n,p:e.p,q:e.q}));
  if(!items.length){alert('請至少選擇一項商品');return}
  const o={id:cnt++,items,total:getTotal(),status:'pending',op:curOp,operName:opName(curOp),at:ts(),paidAt:null,rcv:0,chg:0,isTest,memo:''};
  orders.push(o);updateM();
  payId=o.id;loadPay(o);
  navStack=navStack.filter(s=>s!=='s-new');
  navStack.push('s-shift');
  show('s-pay');
}

/* ---- Payment ---- */
function openPay(id){const o=orders.find(x=>x.id===id);if(!o)return;payId=id;loadPay(o);show('s-pay')}
function loadPay(o){
  document.getElementById('pay-num').textContent=`訂單 ${onum(o)}`;
  document.getElementById('pay-exp').textContent=nt(o.total);
  document.getElementById('pay-items').innerHTML=
    `<div class="op-row"><span style="font-size:12px;color:#6e6e73">操作員</span>${opTag(o.op)}</div>`+
    o.items.map(i=>`<div class="oi"><span>${i.n}</span><span class="oi-qty">×${i.q}</span><span class="oi-sub">${nt(i.p*i.q)}</span></div>`).join('');
  document.getElementById('pay-rcv').value='';
  document.getElementById('pay-chg').textContent='—';
  document.getElementById('pay-chg').style.color='#aeaeb2';
  document.getElementById('pay-memo').value = o.memo || '';
}
function calcChg(){
  const o=orders.find(x=>x.id===payId);if(!o)return;
  const rcv=parseFloat(document.getElementById('pay-rcv').value)||0,chg=rcv-o.total;
  const el=document.getElementById('pay-chg');
  if(!rcv){el.textContent='—';el.style.color='#aeaeb2';return}
  el.textContent=nt(chg);el.style.color=chg>=0?'var(--green)':'var(--red)';
}
function setRcv(n){document.getElementById('pay-rcv').value=n;calcChg()}
function confirmPay(){
  const o=orders.find(x=>x.id===payId);if(!o)return;
  const rcv=parseFloat(document.getElementById('pay-rcv').value)||0;
  if(!rcv){alert('請輸入實收金額');return}
  if(rcv<o.total&&!window.confirm(`實收 ${nt(rcv)} 少於應收 ${nt(o.total)}，確定要繼續嗎？`))return;
  o.status='paid';
  o.rcv=rcv;
  o.chg=rcv-o.total;
  o.paidAt=ts();
  o.memo=document.getElementById('pay-memo').value.trim();
  updateM();renderShift();
  navStack=navStack.filter(s=>s!=='s-pay');
  show('s-shift',false);
}

/* ---- End shift ---- */
function endShift(){
  const pend=orders.filter(o=>o.status==='pending');
  if(!window.confirm(`確定結束 ${shift.day} ${shift.shift}？\n共 ${orders.length} 筆訂單。${pend.length?'\n⚠️ 還有 '+pend.length+' 筆待收款！':''}`))return;
  const rev=orders.filter(o=>o.status==='paid').reduce((s,o)=>s+o.total,0);
  allShifts.push({...shift,orders:JSON.parse(JSON.stringify(orders)),orderCount:orders.length,paidCount:orders.filter(o=>o.status==='paid').length,revenue:rev,endAt:ts(),exported:false,isTest});
  saveShifts();renderHist();shift=null;orders=[];
  navStack=[];show('s-setup',false);
}

/* ---- Persist ---- */
function saveShifts(){try{localStorage.setItem('lw5_shifts',JSON.stringify(allShifts))}catch(e){}}
function loadShifts(){try{const d=localStorage.getItem('lw5_shifts');if(d)allShifts=JSON.parse(d)}catch(e){allShifts=[]}renderHist()}
function delShift(i){
  if(!window.confirm('確定要刪除這筆班次紀錄嗎？這將無法復原。')) return;
  allShifts.splice(i, 1);
  saveShifts();
  renderHist();
}
function renderHist(){
  const w=document.getElementById('hist-wrap');
  if(!allShifts.length){w.style.display='none';return}
  w.style.display='block';
  document.getElementById('hist-list').innerHTML=allShifts.map((s,i)=>`
    <div class="hist-row">
      <div class="hist-info">
        <div class="hist-name">
          <span class="badge b${s.code}" style="font-size:12px">${s.day} ${s.shift}</span>
          ${s.isTest?'<span class="tag tag-test">測試</span>':''}
          <span style="font-size:12px;color:${s.exported?'var(--green)':'var(--amber)'}">${s.exported?'已匯出':'待匯出'}</span>
        </div>
        <div class="hist-detail">${s.staffA}・${s.staffB} · ${s.paidCount}/${s.orderCount} 筆 · <strong style="color:var(--green)">${nt(s.revenue)}</strong></div>
      </div>
      <button class="btn btn-d btn-sm" onclick="event.stopPropagation(); delShift(${i})">刪除</button>
    </div>`).join('');
}

/* ---- Export ---- */
function exportAll(){
  const pend=allShifts.filter(s=>!s.exported);
  if(!pend.length){alert('沒有待匯出的班次');return}
  const headers=['日期','班次','A位','B位','訂單數','已收款數','班次營收(NT$)','訂單明細','開班','結班','備註'];
  
  const rows=pend.map(s=> {
    let memoParts = [];
    if (s.isTest) memoParts.push('【測試資料】');
    let orderMemos = s.orders
      .filter(o => o.memo && o.memo.trim() !== '')
      .map(o => `${onum(o)}備註: ${o.memo.trim()}`);
    if (orderMemos.length > 0) memoParts.push(orderMemos.join(' | '));

    return [
      s.day,s.shift,s.staffA,s.staffB,s.orderCount,s.paidCount,s.revenue,
      s.orders.map(o=>`${onum(o)}[${o.operName||'?'}]:${o.items.map(i=>i.n+'×'+i.q).join('+')}=NT$${o.total}(${o.status==='paid'?'已收':o.status==='void'?'作廢':'未收'})`).join(' | '),
      s.startAt,s.endAt,
      memoParts.join(' | ') 
    ];
  });

  const msgEl=document.getElementById('exp-msg');
  if(GAS_URL){
    fetch(GAS_URL,{
      method:'POST',
      redirect: 'follow', 
      body:JSON.stringify({sheetId:SHEET_ID,sheetName:'記帳單',headers,rows})
    })
      .then(r=>r.json())
      .then(()=>{
        pend.forEach(s=>s.exported=true);
        saveShifts();
        renderHist();
        msgEl.className='notice n-ok';
        msgEl.textContent=`✓ 成功匯出 ${pend.length} 個班次至 Google Sheet`;
        msgEl.style.display='block';
      })
      .catch(()=>{
        msgEl.className='notice n-err';
        msgEl.textContent='連線失敗，請確認 Apps Script 部署權限是否有設為「所有人」';
        msgEl.style.display='block';
      });
  } else {
    pend.forEach(s=>s.exported=true);saveShifts();renderHist();
    msgEl.className='notice n-warn';
    msgEl.innerHTML=`<strong>${pend.length} 個班次已準備就緒</strong><br>請在 HTML 中填入 GAS_URL 後即可自動寫入 Google Sheet。`;
    msgEl.style.display='block';
  }
}
init();
</script>

</html>
